name: ReceiptVault

options:
  bundleIdPrefix: com.ericeijkelenboom
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

schemes:
  ReceiptVault:
    build:
      targets:
        ReceiptVault: all
        ReceiptVaultTests: all
    run:
      config: Debug
    test:
      targets:
        - ReceiptVaultTests
      config: Debug
    archive:
      config: Release

targets:

  ReceiptVault:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ReceiptVault
    info:
      path: ReceiptVault/Info.plist
      properties:
        CFBundleDisplayName: "Receipt Vault"
        NSPhotoLibraryUsageDescription: "ReceiptVault needs access to your photo library to import receipt images."
        NSCameraUsageDescription: "ReceiptVault uses the camera to photograph receipts."
        RECEIPT_PARSER_LAMBDA_ENDPOINT: "https://your-api-gateway-endpoint.execute-api.us-east-1.amazonaws.com/parse-receipt"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - receiptvault
    entitlements:
      path: ReceiptVault/ReceiptVault.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ericeijkelenboom.receiptvault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericeijkelenboom.receiptvault
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ReceiptVault/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "4BAV7733D8"

  ReceiptVaultTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ReceiptVaultTests
    resources:
      - path: ReceiptVaultTests/Fixtures
    info:
      path: ReceiptVaultTests/Info.plist
    dependencies:
      - target: ReceiptVault
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ReceiptVault.app/ReceiptVault"
        INFOPLIST_FILE: ReceiptVaultTests/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "4BAV7733D8"
